<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="tire2" cx="44%" cy="38%" r="58%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#1e1e1e"/><stop offset="100%" stop-color="#050505"/>
  </radialGradient>
  <radialGradient id="disc2" cx="35%" cy="28%" r="68%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#f0f0f0"/><stop offset="25%" stop-color="#d0d0d0"/>
    <stop offset="60%" stop-color="#909090"/><stop offset="100%" stop-color="#404040"/>
  </radialGradient>
  <linearGradient id="spoke2a" x1="0%" y1="100%" x2="15%" y2="0%">
    <stop offset="0%" stop-color="#a0a0a0"/><stop offset="40%" stop-color="#f0f0f0"/>
    <stop offset="70%" stop-color="#ffffff"/><stop offset="100%" stop-color="#c8c8c8"/>
  </linearGradient>
  <linearGradient id="spoke2b" x1="100%" y1="100%" x2="85%" y2="0%">
    <stop offset="0%" stop-color="#909090"/><stop offset="40%" stop-color="#e0e0e0"/>
    <stop offset="70%" stop-color="#f5f5f5"/><stop offset="100%" stop-color="#b8b8b8"/>
  </linearGradient>
  <radialGradient id="hub2" cx="35%" cy="30%" r="60%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#e8e8e8"/><stop offset="100%" stop-color="#606060"/>
  </radialGradient>
  <radialGradient id="hl2" cx="34%" cy="26%" r="45%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="white" stop-opacity="0.35"/><stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="rc2"><circle cx="200" cy="200" r="149"/></clipPath>
  <filter id="ds2" x="-15%" y="-15%" width="130%" height="130%">
    <feDropShadow dx="2" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.65"/>
  </filter>
</defs>
<rect width="400" height="400" fill="#16100A"/>
<ellipse cx="204" cy="396" rx="158" ry="10" fill="rgba(0,0,0,0.45)"/>
<circle cx="200" cy="200" r="190" fill="url(#tire2)" filter="url(#ds2)"/>
<circle cx="200" cy="200" r="186" fill="none" stroke="#1e1e1e" stroke-width="3"/>
<circle cx="200" cy="200" r="164" fill="none" stroke="#161616" stroke-width="4"/>
<circle cx="200" cy="200" r="156" fill="none" stroke="#202020" stroke-width="1.5"/>
<circle cx="200" cy="200" r="149" fill="url(#disc2)"/>
<circle cx="200" cy="200" r="149" fill="#141414" clip-path="url(#rc2)"/>
<!-- 10 spokes: 5 twin-pairs (each pair = two thin spokes 10° apart) -->
<g clip-path="url(#rc2)">
  <!-- Pair 1 at 0° -->
  <g transform="rotate(-5,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2a)"/>
    <line x1="195" y1="164" x2="188" y2="54" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="205" y1="164" x2="208" y2="54" stroke="rgba(0,0,0,0.3)" stroke-width="1"/></g>
  <g transform="rotate(5,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2b)"/>
    <line x1="195" y1="164" x2="188" y2="54" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="205" y1="164" x2="208" y2="54" stroke="rgba(0,0,0,0.3)" stroke-width="1"/></g>
  <!-- Pair 2 at 72° -->
  <g transform="rotate(67,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2a)"/>
    <line x1="195" y1="164" x2="188" y2="54" stroke="rgba(255,255,255,0.3)" stroke-width="1"/></g>
  <g transform="rotate(77,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2b)"/>
    <line x1="205" y1="164" x2="208" y2="54" stroke="rgba(0,0,0,0.3)" stroke-width="1"/></g>
  <!-- Pair 3 at 144° -->
  <g transform="rotate(139,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2a)"/></g>
  <g transform="rotate(149,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2b)"/></g>
  <!-- Pair 4 at 216° -->
  <g transform="rotate(211,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2a)"/></g>
  <g transform="rotate(221,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2b)"/></g>
  <!-- Pair 5 at 288° -->
  <g transform="rotate(283,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2a)"/></g>
  <g transform="rotate(293,200,200)"><polygon points="195,164 188,54 208,54 205,164" fill="url(#spoke2b)"/></g>
  <!-- Inner ring connecting spokes -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="#d0d0d0" stroke-width="5"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Hub -->
  <circle cx="200" cy="200" r="36" fill="url(#hub2)"/>
  <circle cx="200" cy="200" r="36" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
</g>
<!-- Chrome ring -->
<circle cx="200" cy="200" r="145" fill="none" stroke="#e8e8e8" stroke-width="10"/>
<circle cx="200" cy="200" r="145" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
<!-- Center cap -->
<circle cx="200" cy="200" r="25" fill="#e0e0d8"/>
<circle cx="200" cy="200" r="22" fill="#a0a098"/>
<circle cx="200" cy="200" r="15" fill="#d0d0c8"/>
<circle cx="200" cy="200" r="7"  fill="#383830"/>
<circle cx="200" cy="200" r="190" fill="url(#hl2)"/>
<circle cx="200" cy="200" r="149" fill="url(#hl2)" opacity="0.8"/>
</svg>
