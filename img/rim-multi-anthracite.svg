<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="tire3" cx="44%" cy="38%" r="58%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#1e1e1e"/><stop offset="100%" stop-color="#050505"/>
  </radialGradient>
  <radialGradient id="disc3" cx="40%" cy="34%" r="62%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#4a4a4a"/><stop offset="50%" stop-color="#2a2a2a"/>
    <stop offset="100%" stop-color="#111111"/>
  </radialGradient>
  <linearGradient id="spoke3" x1="0%" y1="100%" x2="20%" y2="0%">
    <stop offset="0%" stop-color="#404040"/><stop offset="45%" stop-color="#787878"/>
    <stop offset="75%" stop-color="#909090"/><stop offset="100%" stop-color="#585858"/>
  </linearGradient>
  <radialGradient id="hub3" cx="35%" cy="30%" r="60%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#686868"/><stop offset="100%" stop-color="#202020"/>
  </radialGradient>
  <radialGradient id="hl3" cx="36%" cy="28%" r="45%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="white" stop-opacity="0.2"/><stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="rc3"><circle cx="200" cy="200" r="149"/></clipPath>
  <filter id="ds3" x="-15%" y="-15%" width="130%" height="130%">
    <feDropShadow dx="2" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.7"/>
  </filter>
</defs>
<rect width="400" height="400" fill="#16100A"/>
<ellipse cx="204" cy="396" rx="158" ry="10" fill="rgba(0,0,0,0.5)"/>
<circle cx="200" cy="200" r="190" fill="url(#tire3)" filter="url(#ds3)"/>
<circle cx="200" cy="200" r="186" fill="none" stroke="#1e1e1e" stroke-width="3"/>
<circle cx="200" cy="200" r="164" fill="none" stroke="#161616" stroke-width="4"/>
<circle cx="200" cy="200" r="156" fill="none" stroke="#202020" stroke-width="1.5"/>
<circle cx="200" cy="200" r="149" fill="url(#disc3)"/>
<circle cx="200" cy="200" r="149" fill="#101010" clip-path="url(#rc3)"/>
<!-- 18 spokes alternating long/short -->
<g clip-path="url(#rc3)">
  <!-- Long spokes: 0,40,80,120,160,200,240,280,320 (every 40°) -->
  <!-- Short spokes: 20,60,100,140,180,220,260,300,340 (offset 20°) -->
  <g transform="rotate(0,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(20,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(40,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(60,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(80,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(100,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(120,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(140,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(160,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(180,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(200,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(220,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(240,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(260,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(280,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(300,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <g transform="rotate(320,200,200)"><polygon points="197,164 192,54 208,54 203,164" fill="url(#spoke3)"/></g>
  <g transform="rotate(340,200,200)"><polygon points="197,164 192,100 208,100 203,164" fill="url(#spoke3)" opacity="0.7"/></g>
  <!-- Connecting rings -->
  <circle cx="200" cy="200" r="96" fill="none" stroke="#606060" stroke-width="6"/>
  <circle cx="200" cy="200" r="54" fill="none" stroke="#505050" stroke-width="4"/>
  <!-- Hub -->
  <circle cx="200" cy="200" r="36" fill="url(#hub3)"/>
  <circle cx="200" cy="200" r="36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
</g>
<!-- Outer ring anthracite with chrome edge -->
<circle cx="200" cy="200" r="145" fill="none" stroke="#606060" stroke-width="9"/>
<circle cx="200" cy="200" r="141" fill="none" stroke="rgba(120,120,120,0.5)" stroke-width="2"/>
<!-- Center cap -->
<circle cx="200" cy="200" r="25" fill="#484848"/>
<circle cx="200" cy="200" r="22" fill="#282828"/>
<circle cx="200" cy="200" r="15" fill="#404040"/>
<circle cx="200" cy="200" r="7"  fill="#181818"/>
<circle cx="200" cy="200" r="190" fill="url(#hl3)"/>
</svg>
